name: Daily Research Brief

on:
  schedule:
    # 香港/台灣時間 07:15 = UTC 23:15
    - cron: "15 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check daily send guard
        id: daily_guard
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          today = datetime.now(timezone(timedelta(hours=8))).strftime("%Y-%m-%d")
          now = datetime.now(timezone(timedelta(hours=8)))
          minutes = now.hour * 60 + now.minute
          earliest_send = 7 * 60 + 10
          stamp = Path(".last_successful_brief_date")
          already_sent = stamp.exists() and stamp.read_text(encoding="utf-8").strip() == today
          is_schedule = os.environ.get("GITHUB_EVENT_NAME") == "schedule"
          too_early = is_schedule and minutes < earliest_send
          should_skip = is_schedule and (already_sent or too_early)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"today={today}\n")
              output.write(f"skip={'true' if should_skip else 'false'}\n")

          if too_early:
              print(f"Local time is {now:%H:%M}; too early to send daily brief.")
          elif already_sent and is_schedule:
              print(f"Daily brief for {today} was already sent; skipping backup schedule.")
          else:
              print(f"Daily brief will run for {today} at local time {now:%H:%M}.")
          PY

      - name: Generate daily brief
        if: steps.daily_guard.outputs.skip != 'true'
        run: python fetch_news.py

      - name: Email daily brief
        if: steps.daily_guard.outputs.skip != 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          SMTP_USE_STARTTLS: ${{ secrets.SMTP_USE_STARTTLS }}
        run: python send_email.py

      - name: Mark successful send
        if: steps.daily_guard.outputs.skip != 'true'
        run: echo "${{ steps.daily_guard.outputs.today }}" > .last_successful_brief_date

      - name: Commit generated brief files
        if: steps.daily_guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily_brief.md ai_candidates.md .last_successful_brief_date
          if git diff --cached --quiet; then
            echo "No brief changes to commit."
          else
            git commit -m "Update daily research brief"
            git push
          fi
